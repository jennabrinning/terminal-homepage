<body>
    <main id="terminal-wrapper">
        <div id="terminal-window">
            <!-- Title bar -->
            <header id="title-bar">
                <div id="traffic-lights">
                    <span class="dot dot-close" aria-hidden="true"></span>
                    <span class="dot dot-minimize" aria-hidden="true"></span>
                    <span class="dot dot-maximize" aria-hidden="true"></span>
                </div>
                <span id="title-bar-text">$Jenna Terminal</span>
            </header>

            <!-- Terminal output area -->
            <div id="terminal-body" role="log" aria-live="polite" aria-label="Terminal output">
                <div id="output"></div>

                <!-- Input line -->
                <div id="input-line">
                    <label for="command-input" class="sr-only">Terminal command input</label>
                    <span id="prompt" aria-hidden="true">guest@jenna:~$&nbsp;</span>
                    <input type="text" id="command-input" autocomplete="off" autocapitalize="off" autocorrect="off"
                        spellcheck="false" autofocus aria-label="Type a command">
                </div>
            </div>
        </div>
    </main>

    <script src="terminal.js"></script>
</body>

</html>
